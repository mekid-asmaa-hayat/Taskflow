version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-db
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: taskflow-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskflow
      SPRING_DATASOURCE_USERNAME: taskflow
      SPRING_DATASOURCE_PASSWORD: taskflow123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: mySecretKey123456789012345678901234567890123456789012
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: taskflow-gateway
    environment:
      PORT: 3001
      BACKEND_URL: http://backend:8080
      JWT_SECRET: mySecretKey123456789012345678901234567890123456789012
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  postgres_data:
